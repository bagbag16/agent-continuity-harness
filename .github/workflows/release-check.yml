name: Release Check

on:
  push:
    tags:
      - "v*"

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm test
      - run: npm run demo
      - run: node bin/ach.js validate examples/fixtures/valid-basic
      - run: npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: agent-continuity-harness-*.tgz
